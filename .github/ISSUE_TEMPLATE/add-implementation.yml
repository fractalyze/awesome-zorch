name: Add an implementation
description: Propose an implementation (a *-zorch prover, SNARK, or accumulation scheme) for the catalog.
title: "[impl] <name>"
labels: ["entry", "implementation"]
body:
  - type: markdown
    attributes:
      value: |
        Prefer opening a **PR** with the data file directly (see CONTRIBUTING.md) — it's faster.
        Use this form if you'd rather a maintainer create the entry. Slot fields take entry ids
        like `field/babybear`, `pcs/whir`, `arg/logup-gkr`.
  - type: input
    id: name
    attributes: { label: Name, placeholder: my-zorch }
    validations: { required: true }
  - type: input
    id: repo
    attributes: { label: Upstream repo, placeholder: https://github.com/org/project }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: Upstream version / tag, placeholder: 1.0.0 }
    validations: { required: true }
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options: [Zkvm, Snark, Accumulation]
    validations: { required: true }
  - type: input
    id: field
    attributes: { label: Field (entry id), placeholder: field/babybear }
    validations: { required: true }
  - type: input
    id: hash
    attributes: { label: Hash (entry id), placeholder: hash/poseidon2 }
  - type: input
    id: pcs
    attributes: { label: PCS (entry id), placeholder: pcs/whir }
  - type: input
    id: arithmetization
    attributes: { label: Arithmetization (entry id), placeholder: arith/air }
  - type: input
    id: arguments
    attributes: { label: Arguments (comma-separated entry ids), placeholder: arg/sumcheck-zerocheck, arg/logup-gkr }
  - type: input
    id: extras
    attributes: { label: Folding / decider (entry ids, if any), placeholder: fold/nova, decider impl/groth16 }
  - type: input
    id: pypi
    attributes: { label: PyPI package (if published), placeholder: my-zorch }
  - type: input
    id: license
    attributes: { label: License, placeholder: Apache-2.0 }
  - type: textarea
    id: notes
    attributes: { label: Anything else, description: security level, trace layout, trusted setup, etc. }
  - type: checkboxes
    id: ack
    attributes:
      label: Acknowledgements
      options:
        - label: I understand benchmarks run server-side on a hidden test set — I am not submitting performance numbers.
          required: true
