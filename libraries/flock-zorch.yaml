id: flock-zorch
name: flock-zorch
type: snark
tagline: >-
  GPU port of Flock: R1CS-over-GF(2^128) PIOP (zerocheck + lincheck) with
  BaseFold/Ligerito PCS, byte-identical to upstream across
  Keccak / SHA-256 / BLAKE3.
repo: https://github.com/fractalyze/flock-zorch
upstream:
  name: Flock
  repo: https://github.com/succinctlabs/flock
# TODO(team): not on PyPI yet (checked 2026-07-15) — restore `pypi:` on release.
# pypi: flock-zorch
schemes: [flock]
field: gf2^128
pcs: [basefold, ligerito]
arithmetization: r1cs
